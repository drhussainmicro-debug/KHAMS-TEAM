<title>AMS Guidelines Navigator — Kuwait Hospital</title>
<style>
  :root{
    --navy:#0B2E4F; --navy-ink:#0A2540; --bg:#F5F7FA; --card:#FFFFFF; --line:#DDE3EA;
    --text:#152233; --muted:#5B6B7E; --focus:#1D6FE0;
    --brand-font:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --c-cardio:#B3261E; --c-cns:#6B46C1; --c-eye:#0E7490; --c-gi:#B7791F;
    --c-gu:#BE185D; --c-ortho:#4B5563; --c-resp:#1F7A5C; --c-skin:#C2410C; --c-ref:#0B2E4F;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  #splash{position:fixed;inset:0;z-index:9999;background:var(--navy-ink);display:flex;align-items:center;justify-content:center;transition:opacity .5s ease;}
  #splash.splash-hide{opacity:0;pointer-events:none}
  .splash-inner{text-align:center;color:#fff}
  .splash-logo-wrap{width:150px;height:150px;background:#fff;border-radius:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 26px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.28)}
  .splash-logo{width:100%;height:100%;object-fit:contain}
  .splash-eyebrow{font-family:var(--brand-font);font-size:.72rem;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:#7FA8C9;margin-bottom:14px}
  .splash-mark{font-family:var(--brand-font);font-weight:800;font-size:2.35rem;letter-spacing:-.015em;line-height:1.12;color:#fff;margin-bottom:8px}
  .splash-sub{font-family:var(--brand-font);font-size:1rem;font-weight:500;letter-spacing:.01em;color:#9FB4C7;margin-bottom:30px}
  .splash-spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;margin:0 auto;animation:splash-spin .8s linear infinite}
  @keyframes splash-spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.splash-spinner{animation:none}}
  header.top{background:#fff;color:var(--text);padding:12px 18px;border-bottom:1px solid var(--line)}
  header.top .wrap{max-width:880px;margin:0 auto;display:flex;align-items:center;gap:12px}
  header.top .hdr-logo{width:38px;height:38px;object-fit:contain}
  header.top .hdr-eyebrow{font-family:var(--brand-font);font-size:.68rem;font-weight:700;letter-spacing:.14em;color:var(--focus);text-transform:uppercase}
  header.top .hdr-title{font-family:var(--brand-font);font-size:1.15rem;font-weight:800;letter-spacing:-.01em;color:var(--navy-ink);line-height:1.2}
  .crumbs{max-width:880px;margin:12px auto 0;padding:0 18px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.85rem;color:var(--muted)}
  .crumbs button{background:none;border:none;color:var(--focus);cursor:pointer;font-size:.85rem;padding:2px 4px;font-family:inherit}
  .crumbs button:hover{text-decoration:underline}
  .crumbs .sep{color:#B7C2CE}
  .crumbs .current{color:var(--navy-ink);font-weight:600}
  main{max-width:880px;margin:0 auto;padding:14px 18px 60px}
  .backrow{margin-bottom:14px}
  .backbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:7px 14px;cursor:pointer;font-family:inherit;font-size:.85rem;color:var(--navy-ink);display:inline-flex;align-items:center;gap:6px}
  .backbtn:hover{box-shadow:0 2px 8px rgba(11,46,79,.08)}
  .screen-title{font-family:var(--brand-font);font-weight:800;letter-spacing:-.01em;font-size:1.3rem;margin:2px 0 4px;color:var(--navy-ink)}
  .screen-sub{color:var(--muted);font-size:.88rem;margin:0 0 18px}

  .home-banner{margin-bottom:12px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
  .home-banner .band{padding:8px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:7px}
  .home-banner .band-label{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-right:4px;white-space:nowrap}
  .home-banner .band.principles{background:#0F5C4C}
  .home-banner .band.principles .band-label{color:#BFE8DA}
  .home-banner .band.restricted{background:#5C1717}
  .home-banner .band.restricted .band-label{color:#F3C6C0}
  .home-pill{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;white-space:nowrap}
  .tile-grid.root-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px}
  .tile.badge-tile{align-items:flex-start;text-align:left;padding:15px 14px 15px;border-radius:14px;gap:5px;
    border:1px solid var(--line);border-top:6px solid var(--tile-accent,var(--navy));
    background:var(--card);
    background:linear-gradient(180deg, color-mix(in srgb, var(--tile-accent) 9%, #fff) 0%, var(--card) 46%);
    box-shadow:0 1px 2px rgba(11,46,79,.05);
    transition:box-shadow .18s ease,transform .06s ease,border-color .18s ease}
  .tile.badge-tile:hover{
    border-top-color:var(--tile-accent,var(--navy));
    box-shadow:0 8px 22px color-mix(in srgb, var(--tile-accent) 26%, transparent);
    transform:translateY(-2px)}
  .tile.badge-tile .icon-badge{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
  .tile.badge-tile .icon-badge .icon-svg{width:18px;height:18px}
  .tile.badge-tile .label{font-size:.9rem;line-height:1.2;margin-bottom:1px}
  .tile.badge-tile .cap{font-size:.72rem;line-height:1.32}
  /* Keep two columns on phones so the home fits on one screen (no scroll) */
  @media (max-width:520px){
    .tile-grid.root-grid{grid-template-columns:repeat(2,1fr);gap:8px}
    .tile.badge-tile{padding:11px 11px 12px}
    .tile.badge-tile .cap{font-size:.7rem}
  }
  .tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:6px}
  .tile{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:22px 16px;text-align:center;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:8px;transition:box-shadow .15s,transform .05s;
  }
  .tile:hover{box-shadow:0 6px 18px rgba(11,46,79,.12);transform:translateY(-1px)}
  .tile:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
  .tile .icon{font-size:2.1rem;line-height:1}
  .tile .icon .icon-svg{width:1em;height:1em;display:inline-block;vertical-align:middle;color:var(--navy-ink)}
  .tile .label{font-weight:700;font-size:.98rem;color:var(--navy-ink)}
  .tile .cap{font-size:.76rem;color:var(--muted)}
  .tile.system{align-items:flex-start;text-align:left;border-left:5px solid var(--accent,#999);padding:16px 16px}
  .tile.mono-cat-tile{align-items:flex-start;text-align:left;padding:16px 16px 16px 20px;position:relative}
  .tile.mono-cat-tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--aware-bar);border-radius:14px 0 0 14px}
  .tile.mono-cat-tile .cap{line-height:1.4}
  .tile.system .icon .icon-svg{color:var(--accent,#999)}
  .tile.system .label{font-size:.92rem}
  .tile.system .cap{font-size:.74rem}
  .tile.refTile{align-items:flex-start;text-align:left;border-left:5px solid var(--c-ref);padding:16px 16px;background:#F0F5FA}

  .section-divider{display:flex;align-items:center;gap:10px;margin:26px 0 12px;color:var(--navy-ink);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.4px}
  .section-divider::before,.section-divider::after{content:"";flex:1;height:1px;background:var(--line)}

  .cond-group{margin-bottom:22px}
  .cond-group h3{font-size:1rem;color:var(--navy-ink);margin:0 0 8px;padding-bottom:6px;border-bottom:2px solid var(--line)}
  .cond-list{display:flex;flex-direction:column;gap:8px}
  .cond-btn{
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px;
    text-align:left;cursor:pointer;font-family:inherit;font-size:.9rem;color:var(--text);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .cond-btn:hover{box-shadow:0 2px 10px rgba(11,46,79,.08)}
  .cond-btn .chev{color:var(--muted);flex:0 0 auto}

  .detail-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;border-top:5px solid var(--accent,#999)}
  .detail-card h2{margin:0 0 4px;font-size:1.15rem;color:var(--navy-ink)}
  .detail-card .workup{font-style:italic;color:var(--muted);font-size:.85rem;margin-bottom:12px}
  .detail-card p{margin:0 0 10px;font-size:.92rem}
  .detail-card strong{color:var(--navy-ink)}
  .peds-note{background:#FFF8E8;border:1px solid #F0D999;color:#7A5B00;border-radius:10px;padding:12px 14px;font-size:.85rem;margin-bottom:18px}

  .principles-panel{margin-bottom:28px}
  .principles-panel h2{font-size:1.05rem;margin:0 0 3px;color:var(--navy-ink)}
  .principles-panel .sub{color:var(--muted);font-size:.85rem;margin:0 0 14px}
  .principles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .principle-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;border-left:4px solid #999}
  .principle-card h4{margin:0 0 8px;font-size:.85rem;color:var(--navy-ink);text-transform:uppercase;letter-spacing:.3px}
  .principle-card ul{margin:0;padding-left:18px}
  .principle-card li{font-size:.85rem;margin-bottom:6px;line-height:1.4}
  .principle-card li:last-child{margin-bottom:0}
  .principle-card .note{font-size:.78rem;color:var(--muted);margin:0 0 8px;font-style:italic}
  .principle-card.core{border-left-color:var(--navy)}
  .principle-card.screening{border-left-color:#B7791F}
  .principle-card.restricted{border-left-color:#B3261E}
  .principle-card.restricted li strong{color:var(--navy-ink)}
  .principle-card.oversight{border-left-color:#1F7A5C}

  .dose-mini{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  .dose-mini h4{margin:0 0 8px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--navy-ink)}
  .dose-mini table{width:100%;border-collapse:collapse;font-size:.82rem}
  .dose-mini td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:top}
  .dose-mini td.drug{font-weight:600;color:var(--navy-ink);white-space:nowrap}

  .ref-table{width:100%;border-collapse:collapse;font-size:.84rem;margin-bottom:22px;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .ref-table caption{text-align:left;font-weight:700;color:var(--navy-ink);padding:12px 14px 8px;font-size:.92rem}
  .ref-table th{background:#EEF3F8;text-align:left;padding:8px 10px;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--navy-ink)}
  .ref-table td{padding:8px 10px;border-top:1px solid var(--line)}
  .ref-note{font-size:.78rem;color:var(--muted);margin:-14px 0 22px;padding:0 2px}

  /* Calculator form elements */
  .field{margin-bottom:12px}
  .field label{display:block;font-size:.82rem;font-weight:600;color:var(--navy-ink);margin-bottom:4px}
  .field input[type=number], .field select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;font-size:.95rem;font-family:inherit;background:#fff}
  .field input:focus, .field select:focus{outline:2px solid var(--focus)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .check{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px;font-size:.88rem}
  .check input{margin-top:3px}
  .result{background:#F0F6FB;border:1px solid #CFE0EE;border-radius:10px;padding:14px 16px;margin-top:12px}
  .result .big{font-size:1.5rem;font-weight:700;color:var(--navy-ink)}
  .result .label{font-size:.78rem;font-weight:700;color:var(--navy-ink);text-transform:uppercase;letter-spacing:.3px}
  .result .interp{margin-top:6px;font-size:.86rem}
  .result-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px}
  .warn{background:var(--warn-bg,#FDF1EC);border:1px solid var(--warn-line,#E7A98A);color:var(--warn-text,#8A3E1E);border-radius:8px;padding:10px 12px;font-size:.82rem;margin-top:12px}
  .detail-card .ref{font-size:.78rem;color:var(--muted);margin-top:14px;border-top:1px solid var(--line);padding-top:10px}

  .sev-badge{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.3px;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .sev-major{background:#FDECEA;color:#B3261E;border:1px solid #F3B4AC}
  .sev-moderate{background:#FFF4E0;color:#8A5A00;border:1px solid #F0CB80}
  .sev-minor{background:#EAF2FA;color:#1D4E89;border:1px solid #B9D3EA}
  .ix-pair{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .ix-pair:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
  .ix-pair-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px}
  .ix-pair p{margin:2px 0;font-size:.88rem}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#EEF3F8;border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 12px;font-size:.85rem;color:var(--navy-ink)}
  .chip em{font-style:normal;color:var(--muted);font-size:.78rem}
  .chip-x{background:none;border:none;cursor:pointer;font-size:1rem;line-height:1;color:var(--muted);padding:2px 7px;border-radius:999px;font-family:inherit}
  .chip-x:hover{background:rgba(179,38,30,.12);color:#B3261E}
  .ix-clean-list, .ix-skip-list{font-size:.8rem;color:var(--muted);margin-top:12px;line-height:1.5}
  .refs-block{margin-top:28px;border-top:1px solid var(--line);padding-top:18px}
  .refs-block h3{font-size:.95rem;margin:0 0 6px;color:var(--navy-ink)}
  .refs-block .refs-note{font-size:.82rem;color:var(--muted);margin:0 0 12px}
  .refs-block h4{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--navy-ink);margin:14px 0 6px}
  .refs-block ol{margin:0;padding-left:20px}
  .refs-block li{font-size:.82rem;margin-bottom:8px;line-height:1.5}
  .refs-block a{color:var(--focus);word-break:break-word}

  .mono-field{margin-bottom:12px}
  .mono-field .mf-label{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--navy-ink);margin-bottom:4px}
  .mono-field .mf-val{font-size:.92rem;color:var(--text)}
  .mono-action-badge{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.3px;padding:3px 10px;border-radius:999px;background:#EAF2FA;color:#1D4E89;border:1px solid #B9D3EA}

  /* ===== Sepsis Pathway ===== */
  .sep-wrap{display:flex;flex-direction:column;gap:14px}
  .sep-emerg{background:#FDECEA;border-color:#F3B4AC;color:#7A1B12}
  .sep-local{background:#FFF7E6;border-color:#F0D9A6}
  .sep-tag{display:inline-block;background:var(--navy-ink);color:#fff;font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:1px 6px;border-radius:6px;vertical-align:middle;margin-left:4px}
  .sep-step{border-left:4px solid var(--navy)}
  .sep-head{display:flex;align-items:center;gap:10px;margin-bottom:2px}
  .sep-head h2{margin:0}
  .sep-num{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem}
  .sep-p{color:var(--text);font-size:.9rem;margin:.2rem 0 .6rem}
  .sep-btnrow{display:flex;flex-direction:column;gap:8px;margin:.4rem 0}
  .sep-link{width:100%}
  .sep-flags{background:#FFF7E6;border:1px solid #F0D9A6;border-radius:10px;padding:10px 12px;font-size:.82rem;color:#6B4E12;margin-top:8px}
  .sep-timer{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:.4rem 0}
  .sep-elapsed{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:2rem;font-weight:700;line-height:1;color:var(--navy-ink)}
  .sep-elapsed.sep-warn{color:#B7791F}
  .sep-elapsed.sep-over{color:#B3261E}
  .sep-elapsed-sub{font-size:.72rem;color:var(--muted);margin-top:4px}
  .sep-timer-btns{display:flex;gap:8px;flex:0 0 auto}
  .sep-btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-weight:600;font-size:.85rem;cursor:pointer}
  .sep-btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--line)}
  .sep-progress{height:8px;background:var(--line);border-radius:6px;overflow:hidden;margin-top:6px}
  .sep-progress-bar{height:100%;width:0;background:#1F7A5C;transition:width .25s ease}
  .sep-progress-label{font-size:.75rem;color:var(--muted);margin:4px 0 8px}
  .sep-check label{font-size:.86rem}
  .sep-fluid-out{margin:0}
  .sep-target{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:.82rem;color:var(--text);margin-top:10px}
  .sep-inline-link{background:none;border:none;color:var(--navy);font-weight:600;cursor:pointer;padding:0;font-size:.8rem;text-decoration:underline}
  .sep-refs{margin-top:4px}

</style>
</head>

const CALCULATORS = [
{ name:"Organ Function (Renal & Hepatic)", calcs:[

  { id:"crcl", title:"Creatinine Clearance", sub:"Cockcroft–Gault (SI)", html:`
    <div class="field"><label>Sex</label>
      <select id="cg_sex"><option value="1.23">Male</option><option value="1.04">Female</option></select>
    </div>
    <div class="row2">
      <div class="field"><label>Age (years)</label><input type="number" id="cg_age" min="18" max="110"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="cg_ht" min="100"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="cg_wt" min="1"></div>
      <div class="field"><label>Serum creatinine (µmol/L)</label><input type="number" id="cg_scr" min="1"></div>
    </div>
    <div class="result">
      <div class="label">Estimated CrCl</div>
      <div class="big" id="cg_out">—</div>
      <div class="interp" id="cg_weightnote"></div>
    </div>
    <div class="ref">CrCl (mL/min) = [(140−age) × weight(kg) × k] / SCr(µmol/L), k = 1.23 (male) / 1.04 (female). Weight selection follows Winter MA, Guhr KN, Berg GM. <em>Pharmacotherapy</em> 2012;32(7):604–612 (the same reference Sanford's calculator cites): BMI &lt;18.5 → Actual Body Weight; BMI 18.5–24.9 → Ideal Body Weight (Devine); BMI ≥25 → Adjusted Body Weight = IBW + 0.4×(actual−IBW). Applied at any height, matching Sanford — verified against a Sanford test case (83y male, 130cm, 60kg, SCr 240µmol/L → 12.2 mL/min).</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const sex = $('#cg_sex',root).value==='1.23' ? 'm' : 'f', k=parseFloat($('#cg_sex',root).value);
      const age=num($('#cg_age',root)), wt=num($('#cg_wt',root)), ht=num($('#cg_ht',root)), scr=num($('#cg_scr',root));
      let r='—', note='';
      if(age!==null && wt!==null && ht!==null && scr && scr>0){
        const htIn = ht/2.54;
        const ibwVal = sex==='m' ? 50+2.3*(htIn-60) : 45.5+2.3*(htIn-60);
        const bmi = wt / Math.pow(ht/100, 2);
        let useWt;
        if(bmi < 18.5){
          useWt = wt;
          note = 'BMI '+fmt(bmi,1)+' (underweight) — using actual body weight ('+fmt(wt,1)+' kg).';
        } else if(bmi < 25){
          useWt = ibwVal;
          note = 'BMI '+fmt(bmi,1)+' (normal) — using ideal body weight ('+fmt(ibwVal,1)+' kg), not actual weight.';
        } else {
          useWt = ibwVal + 0.4*(wt-ibwVal);
          note = 'BMI '+fmt(bmi,1)+' (overweight/obese) — using adjusted body weight ('+fmt(useWt,1)+' kg; IBW '+fmt(ibwVal,1)+' kg).';
        }
        r = fmt(((140-age)*useWt*k)/scr,1)+' mL/min';
      }
      calcOut(root,'#cg_out',r);
      calcOut(root,'#cg_weightnote',note);
    });
  }},

  { id:"ibw", title:"Ideal & Adjusted Body Weight", sub:"Devine formula", html:`
    <div class="field"><label>Sex</label><select id="ibw_sex"><option value="m">Male</option><option value="f">Female</option></select></div>
    <div class="row2">
      <div class="field"><label>Height (cm)</label><input type="number" id="ibw_ht" min="100"></div>
      <div class="field"><label>Actual weight (kg) — optional</label><input type="number" id="ibw_wt"></div>
    </div>
    <div class="result">
      <div class="result-row"><span class="label">Ideal Body Weight</span><span id="ibw_out">—</span></div>
      <div class="result-row"><span class="label">Adjusted Body Weight</span><span id="abw_out">—</span></div>
      <div class="interp" id="ibw_note"></div>
    </div>
    <div class="ref">Devine: male 50 + 2.3×(height in − 60); female 45.5 + 2.3×(height in − 60). ABW = IBW + 0.4×(actual − IBW), used for dosing weight only when actual weight is &gt;20% above IBW.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const sex=$('#ibw_sex',root).value, ht=num($('#ibw_ht',root)), wt=num($('#ibw_wt',root));
      let ibwOut='—', abwOut='—', note='';
      if(ht!==null){
        const htIn=ht/2.54;
        const ibwVal = sex==='m' ? 50+2.3*(htIn-60) : 45.5+2.3*(htIn-60);
        ibwOut = fmt(ibwVal,1)+' kg';
        if(ht<152) note='Height below 152 cm — Devine formula is unreliable here; use clinical judgement.';
        if(wt!==null){
          if(wt>1.2*ibwVal){ abwOut = fmt(ibwVal+0.4*(wt-ibwVal),1)+' kg'; note += (note?' ':'')+'Actual weight is &gt;20% above IBW — adjusted weight generally preferred for dosing.'; }
          else abwOut = fmt(wt,1)+' kg (= actual weight)';
        }
      }
      calcOut(root,'#ibw_out',ibwOut); calcOut(root,'#abw_out',abwOut); calcOut(root,'#ibw_note',note);
    });
  }},

  { id:"bmi", title:"BMI (Body Mass Index)", sub:"", html:`
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="bmi_wt"></div>
      <div class="field"><label>Height (cm)</label><input type="number" id="bmi_ht"></div>

  `, init(root){
    root.addEventListener('input', ()=>{
      const wt=num($('#bmi_wt',root)), ht=num($('#bmi_ht',root));
      let r='—', band='';
      if(wt!==null && ht){ const b=wt/Math.pow(ht/100,2); r=fmt(b,1); band = b<18.5?'Underweight':b<25?'Normal':b<30?'Overweight':b<35?'Obese class I':b<40?'Obese class II':'Obese class III'; }
      calcOut(root,'#bmi_out',r); calcOut(root,'#bmi_band',band);
    });
  }},

  { id:"childpugh", title:"Child-Pugh Score", sub:"Hepatic impairment", html:`
    <div class="field"><label>Bilirubin (µmol/L)</label><select id="cp_bili"><option value="1">&lt; 34 (1 pt)</option><option value="2">34–50 (2 pt)</option><option value="3">&gt; 50 (3 pt)</option></select></div>
    <div class="field"><label>Albumin (g/L)</label><select id="cp_alb"><option value="1">&gt; 35 (1 pt)</option><option value="2">28–35 (2 pt)</option><option value="3">&lt; 28 (3 pt)</option></select></div>
    <div class="field"><label>INR</label><select id="cp_inr"><option value="1">&lt; 1.7 (1 pt)</option><option value="2">1.7–2.3 (2 pt)</option><option value="3">&gt; 2.3 (3 pt)</option></select></div>
    <div class="field"><label>Ascites</label><select id="cp_asc"><option value="1">None (1 pt)</option><option value="2">Mild (2 pt)</option><option value="3">Moderate–severe (3 pt)</option></select></div>
    <div class="field"><label>Encephalopathy</label><select id="cp_enc"><option value="1">None (1 pt)</option><option value="2">Grade 1–2 (2 pt)</option><option value="3">Grade 3–4 (3 pt)</option></select></div>
    <div class="result"><div class="label">Child-Pugh Score</div><div class="big" id="cp_out">—</div><div class="interp" id="cp_class"></div></div>
    <div class="ref">Class A (5–6): compensated. Class B (7–9): significant compromise. Class C (10–15): decompensated — dose-reduce or avoid hepatically-cleared antimicrobials; consult pharmacy.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const ids=['cp_bili','cp_alb','cp_inr','cp_asc','cp_enc'];
      const total = ids.reduce((s,id)=>s+parseInt($('#'+id,root).value),0);
      calcOut(root,'#cp_out', total);
      calcOut(root,'#cp_class', total<=6?'Class A':total<=9?'Class B':'Class C');
    });
  }},

  { id:"meld", title:"MELD Score", sub:"Classic MELD — general severity estimate", html:`
    <div class="field"><label>Bilirubin (µmol/L)</label><input type="number" id="md_bili"></div>
    <div class="field"><label>INR</label><input type="number" step="0.01" id="md_inr"></div>
    <div class="field"><label>Creatinine (µmol/L)</label><input type="number" id="md_cr"></div>
    <div class="check"><input type="checkbox" id="md_dialysis"><label for="md_dialysis">Dialysis ≥2× in past week, or CVVHD ≥24h</label></div>
    <div class="result"><div class="label">MELD Score</div><div class="big" id="md_out">—</div></div>
    <div class="warn">Coefficients are calibrated in mg/dL — inputs here are converted internally (µmol/L ÷ 17.1 for bilirubin, ÷ 88.4 for creatinine). All values floored at 1.0 mg/dL; creatinine capped at 4.0 mg/dL (or set to 4.0 if on dialysis/CVVHD). Score bounded 6–40.</div>
    <div class="ref">Classic/original MELD, shown for reference only. UNOS transplant allocation now uses MELD-Na / MELD 3.0.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const bili=num($('#md_bili',root)), inr=num($('#md_inr',root)), cr=num($('#md_cr',root));
      const dialysis=$('#md_dialysis',root).checked;
      let r='—';
      if(bili!==null && inr!==null && cr!==null){
        const bili_mgdl=Math.max(bili/17.1,1.0);
        const inr_v=Math.max(inr,1.0);
        let cr_mgdl = dialysis?4.0:Math.max(cr/88.4,1.0);
        cr_mgdl=Math.min(cr_mgdl,4.0);
        let score=3.78*ln(bili_mgdl)+11.2*ln(inr_v)+9.57*ln(cr_mgdl)+6.43;
        score=Math.round(score); score=Math.max(6,Math.min(40,score));
        r=score;
      }
      calcOut(root,'#md_out', r);
    });
  }}

]},

      <div class="result-row"><span class="label">AUC₂₄</span><span class="big" id="va_auc">—</span></div>
      <div class="result-row"><span class="label">t½</span><span id="va_thalf">—</span></div>
      <div class="result-row" id="va_extraprow" style="display:none"><span class="label">Extrapolated true peak/trough</span><span id="va_extrap">—</span></div>
      <div class="result-row" id="va_clrow" style="display:none"><span class="label">Estimated CL / Vd</span><span id="va_cl">—</span></div>
      <div class="interp" id="va_interp"></div>
    </div>
    <div class="ref">Leaving T1/T2 blank assumes idealized timing (peak exactly at end of infusion, trough exactly before the next dose) — identical to the simple two-level method. Filling them in back-extrapolates the true end-of-infusion peak and forward-extrapolates the true pre-dose trough using ke calculated from the actual elapsed time between draws, then applies the same trapezoidal method: AUC(inf)=Tinf×(Cmax,true+Cmin,true)/2, AUC(elim)=(Cmax,true−Cmin,true)/ke, AUC24=[AUC(inf)+AUC(elim)]×24/τ. Target 400–600 mg·hr/L.</div>
  `, init(root){
    root.addEventListener('input', ()=>{
      const dose=num($('#va_dose',root)), tinf=num($('#va_tinf',root)), tau=num($('#va_tau',root)), cmax=num($('#va_cmax',root)), cmin=num($('#va_cmin',root));
      const tPeakIn=num($('#va_tpeak',root)), tTroughIn=num($('#va_ttrough',root));
      let aucOut='—', thalfOut='—', interp='', extrapOut='—', clOut='—'; let showExtrap=false, showCl=false;

      if(tinf!==null && tau!==null && cmax!==null && cmin!==null && cmax>cmin && cmin>0 && tau>tinf){
        const tPeak = tPeakIn!==null ? tPeakIn : tinf;
        const tTrough = tTroughIn!==null ? tTroughIn : tau;

        if(tPeak >= tinf - 1e-9 && tTrough > tPeak && tTrough <= tau + 1e-9){
          const dt = tTrough - tPeak;
          const ke = (ln(cmax)-ln(cmin)) / dt;
          const thalf = 0.693/ke;

          const t1 = tPeak - tinf;              // time from infusion end to peak draw
          const cmaxTrue = cmax * Math.exp(ke*t1);
          const t2 = tau - tTrough;              // time from trough draw to next dose
          const cminTrue = cmin * Math.exp(-ke*t2);

          const aucInf = tinf*(cmaxTrue+cminTrue)/2;
          const aucElim = (cmaxTrue-cminTrue)/ke;
          const aucTau = aucInf+aucElim;
          const auc24 = aucTau*(24/tau);

          aucOut=fmt(auc24,0)+' mg·hr/L'; thalfOut=fmt(thalf,1)+' hr';
          interp = auc24<400?'<strong>Below target</strong> — likely subtherapeutic.':auc24<=600?'<strong>Within target</strong> (400–600).':'<strong>Above target</strong> — nephrotoxicity risk.';

          if(tPeakIn!==null || tTroughIn!==null){
            showExtrap = true;
            extrapOut = 'Peak '+fmt(cmaxTrue,1)+' µg/mL (measured '+fmt(cmax,1)+' at T1='+fmt(tPeak,1)+'h) · Trough '+fmt(cminTrue,1)+' µg/mL (measured '+fmt(cmin,1)+' at T2='+fmt(tTrough,1)+'h)';
          }
          if(dose!==null && dose>0){
            const cl = dose/aucTau;      // L/hr
            const vd = cl/ke;            // L
            clOut = fmt(cl,2)+' L/hr &nbsp;/&nbsp; Vd ≈ '+fmt(vd,1)+' L';
            showCl = true;
          }
        } else {
          interp = 'Check T1/T2: T1 must be at/after end of infusion, T2 must be after T1 and at/before τ.';
        }
      } else if(tinf!==null||tau!==null||cmax!==null||cmin!==null){ interp='Need Cmax &gt; Cmin &gt; 0 and τ &gt; Tinf.'; }

      calcOut(root,'#va_auc',aucOut); calcOut(root,'#va_thalf',thalfOut); calcOut(root,'#va_interp',interp);
      calcOut(root,'#va_cl',clOut);
      $('#va_clrow',root).style.display = showCl ? 'flex' : 'none';
      calcOut(root,'#va_extrap',extrapOut);
      $('#va_extraprow',root).style.display = showExtrap ? 'flex' : 'none';
    });
  }},

  { id:"colistin", title:"Colistin (Colistimethate) Dosing", sub:"Nation 2017 / Intl Consensus Guidelines — restricted drug", html:`
    <div class="warn">This uses the renal-function look-up table method (Nation et al., <em>Clin Infect Dis</em> 2017;64:565–571; International Consensus Guidelines for the Optimal Use of the Polymyxins) — the "clinician-friendly" algorithm that underlies the Sanford Guide colistin calculator, replacing the earlier continuous-formula version here. Targets Css,avg = 2 mg/L. Not for patients on renal replacement therapy (HD/CRRT) — consult ID/pharmacy for RRT-specific dosing.</div>
    <div class="row2">
      <div class="field"><label>Weight (kg)</label><input type="number" id="co_wt"></div>
      <div class="field"><label>CrCl (mL/min)</label><input type="number" id="co_crcl"></div>
    </div>
    <div class="hint" style="font-size:.78rem;color:var(--muted);margin:-6px 0 10px">Use the <strong>lower</strong> of actual or ideal body weight for the loading dose (see Ideal &amp; Adjusted Body Weight calculator).</div>
    <div class="result">
      <div class="result-row"><span class="label">Loading dose (once)</span><span class="big" id="co_load">—</span></div>
      <div class="result-row"><span class="label">Maintenance (per 12h, from 12h after loading)</span><span class="big" id="co_maint">—</span></div>
      <div class="interp" id="co_note"></div>
    </div>
    <div class="warn" id="co_warn" style="display:none"></div>
    <div class="ref">Loading dose = 4 × weight(kg), mg CBA — many protocols cap this around 300mg CBA regardless of calculated value; confirm local practice, especially &gt;100kg. Maintenance dose is a renal-function band (not a continuous formula) targeting Css,avg 2 mg/L, derived from Nation et al. 2017. Confirm local mg CBA↔CMS↔IU conversion before administering. Restricted — ID/microbiology consult required.</div>
  `, init(root){
    const COLISTIN_BANDS = [
      {min:90, dose:182, label:"≥90"},
      {min:80, dose:172, label:"80–89"},
      {min:70, dose:149, label:"70–79"},
      {min:60, dose:139, label:"60–69"},
      {min:50, dose:122, label:"50–59"},
      {min:40, dose:109, label:"40–49"},
      {min:30, dose:99, label:"30–39"},
      {min:20, dose:86, label:"20–29"},
      {min:10, dose:79, label:"10–19"},
      {min:5, dose:73, label:"5–9"},
      {min:0, dose:66, label:"0–4"}
    ];
    root.addEventListener('input', ()=>{
      const wt=num($('#co_wt',root)), crcl=num($('#co_crcl',root));
      let loadOut='—', maintOut='—', note='', warn='';
      if(wt!==null) loadOut=fmt(4*wt,0)+' mg CBA';
      if(crcl!==null && crcl>=0){
        const band = COLISTIN_BANDS.find(b => crcl>=b.min);
        maintOut = fmt(band.dose,0)+' mg CBA q12h ('+fmt(band.dose*2,0)+' mg CBA/day)';
        note = 'CrCl band: '+band.label+' mL/min.';
        if(crcl<10) warn='CrCl &lt;10 mL/min and not on RRT: dosing is high-risk at this renal function — confirm with ID/pharmacy. This table does not apply to patients receiving hemodialysis or CRRT.';
      }
      calcOut(root,'#co_load',loadOut); calcOut(root,'#co_maint',maintOut); calcOut(root,'#co_note',note);
      const w=$('#co_warn',root); w.style.display=warn?'block':'none'; w.innerHTML=warn;
    });
  }}

]},

let stack = [{type:"root"}];
function push(screen){
  stack.push(screen);
  history.pushState({navStackLen: stack.length}, "");
  render();
}
function pop(){
  if(stack.length>1) history.back();
}
window.addEventListener("popstate", (e)=>{
  const len = (e.state && e.state.navStackLen) ? e.state.navStackLen : 1;
  stack.length = Math.max(1, len);
  render();
});
document.getElementById("backBtn").addEventListener("click", pop);

function trackLabel(track){ return track==="adult" ? "Adult Guidance" : track==="pediatric" ? "Pediatric Guidance" : "Surgical Prophylaxis"; }
/* ============================================================
   SEPSIS PATHWAY (aligned to Surviving Sepsis Campaign 2026;
   all LOCAL-tagged items must be adapted to hospital protocol)
   ============================================================ */
let SEPSIS_STATE = { started:null, checks:{}, wt:null };
let SEPSIS_TIMER = null;

function findCalc(id){
  for(const cat of CALCULATORS){ const c=cat.calcs.find(x=>x.id===id); if(c) return {cat:cat.name, calc:c}; }
  return null;
}
function openCalc(id){ const f=findCalc(id); if(f) push({type:"calc-detail", category:f.cat, calc:f.calc}); }

function findAdultItem(system, groupTitle, itemName){
  const sys=ADULT.find(s=>s.system===system); if(!sys) return null;
  for(const g of sys.groups){
    if(groupTitle && g.title!==groupTitle) continue;
    const it=g.items.find(i=>i.name===itemName);
    if(it) return {sys, group:g, item:it};
  }
  return null;
}
function openSource(system, groupTitle, itemName){
  const r = (groupTitle && itemName) ? findAdultItem(system, groupTitle, itemName) : null;
  if(r){ push({type:"detail", track:"adult", system:system, groupTitle:r.group.title, item:r.item}); return; }
  const sys=ADULT.find(s=>s.system===system);
  if(sys){ push({type:"system", track:"adult", system:system, data:sys}); }
}

      <div class="check sep-check"><input type="checkbox" id="sb_fluid"><label for="sb_fluid">Start <strong>crystalloid</strong> if hypotension or lactate ≥ 4 — see Step 4</label></div>
      <div class="check sep-check"><input type="checkbox" id="sb_vaso"><label for="sb_vaso">Add <strong>vasopressors</strong> if MAP &lt; 65 during/after fluids — see Step 4</label></div>
      <div class="ref">2026 note: cultures and antibiotics stay urgent within the hour; the full ≥ 30 mL/kg crystalloid volume is framed over the first 3 hours with ongoing reassessment. In low-resource settings a single blood-culture set can be justified.</div>

    <div class="detail-card sep-step">
      <div class="sep-head"><span class="sep-num">3</span><h2>Antibiotics — by suspected source <span class="sep-tag">LOCAL</span></h2></div>

  content.appendChild(wrap);

  const sources=[

    ["🫁 Respiratory / pneumonia","Respiratory Tract & ENT Infections",null,null],
    ["🚽 Urinary (urosepsis)","Genitourinary & Reproductive Infections","Genitourinary (Adult)","Complicated UTI"],
    ["🩹 Intra-abdominal","Gastrointestinal Infections","Intra-abdominal","Perforated Appendicitis/Abscess — Severe: peritonitis/septic shock"],
    ["🦠 Skin / soft tissue","Skin & Soft Tissue Infections","Community Skin & Soft Tissue","Necrotizing Fasciitis"],
    ["🧠 CNS / meningitis","Central Nervous System (CNS) Infections","Meningitis","Empiric — Elderly/immunocompromised, or Age 1 month–50 years"]

  sources.forEach(function(row){

  wrap.querySelectorAll("[data-nav]").forEach(function(el){ el.addEventListener("click", function(){ push({type:el.getAttribute("data-nav")}); }); });

  wt.addEventListener("input", function(){ SEPSIS_STATE.wt = wt.value; updFluid(); });
  if(SEPSIS_STATE.wt!=null && SEPSIS_STATE.wt!==""){ wt.value=SEPSIS_STATE.wt; updFluid(); }

  const bundleIds=["sb_lac","sb_cult","sb_abx","sb_fluid","sb_vaso"];
  const reassessIds=["sr_lac","sr_src","sr_cult","sr_ivpo","sr_plan"];
  const bar=$("#sep_bar",wrap), prog=$("#sep_prog",wrap);
  function updProg(){
    let n=0; bundleIds.forEach(function(id){ if($("#"+id,wrap).checked) n++; });
    bar.style.width=(n/5*100)+"%";
    prog.textContent=n+" / 5 complete";
  }
  bundleIds.concat(reassessIds).forEach(function(id){
    const cb=$("#"+id,wrap);
    if(SEPSIS_STATE.checks[id]) cb.checked=true;
    cb.addEventListener("change", function(){ SEPSIS_STATE.checks[id]=cb.checked; updProg(); });
  });
  updProg();

  const elapsed=$("#sep_elapsed",wrap), elapsedSub=$("#sep_elapsed_sub",wrap);
  function fmtElapsed(){
    if(!SEPSIS_STATE.started){ elapsed.textContent="--:--"; elapsed.className="sep-elapsed"; elapsedSub.textContent="clock not started"; return; }
    const secs=Math.floor((Date.now()-SEPSIS_STATE.started)/1000);
    const mm=String(Math.floor(secs/60)).padStart(2,"0"), ss=String(secs%60).padStart(2,"0");
    elapsed.textContent=mm+":"+ss;
    const mins=secs/60;
    elapsed.className="sep-elapsed"+(mins>=60?" sep-over":mins>=45?" sep-warn":"");
    elapsedSub.textContent = (mins>=60? "over the 1-hour target" : "target: cultures + antibiotics within 60 min");
  }
  if(SEPSIS_TIMER){ clearInterval(SEPSIS_TIMER); SEPSIS_TIMER=null; }
  function tick(){ if(!document.body.contains(elapsed)){ clearInterval(SEPSIS_TIMER); SEPSIS_TIMER=null; return; } fmtElapsed(); }
  $("#sep_start",wrap).addEventListener("click", function(){ if(!SEPSIS_STATE.started) SEPSIS_STATE.started=Date.now(); if(!SEPSIS_TIMER) SEPSIS_TIMER=setInterval(tick,1000); fmtElapsed(); });

    SEPSIS_STATE.started=null;
    if(SEPSIS_TIMER){ clearInterval(SEPSIS_TIMER); SEPSIS_TIMER=null; }
    bundleIds.concat(reassessIds).forEach(function(id){ const cb=$("#"+id,wrap); if(cb) cb.checked=false; SEPSIS_STATE.checks[id]=false; });
    updProg(); fmtElapsed();
  });
  if(SEPSIS_STATE.started && !SEPSIS_TIMER){ SEPSIS_TIMER=setInterval(tick,1000); }
  fmtElapsed();
}


function crumbLabel(s){
  if(s.type==="root") return "Home";
  if(s.type==="home") return "Guidelines";
  if(s.type==="sepsis") return "Sepsis Pathway";
  if(s.type==="principles") return "Antimicrobial Prescribing Principles";
  if(s.type==="track") return trackLabel(s.track);
  if(s.type==="system") return s.system;
  if(s.type==="detail") return s.item.name;
  if(s.type==="doseref") return "Surgical Prophylaxis Dosing";
  if(s.type==="calc-cats") return "Calculators";
  if(s.type==="calc-list") return s.category;
  if(s.type==="calc-detail") return s.calc.title;
  if(s.type==="favorites") return "Favorites & Recent";
  if(s.type==="interactions") return "Drug Interaction Checker";
  if(s.type==="interaction-detail") return s.drug.name;
  if(s.type==="mono-cats") return "Antimicrobial Information";
  if(s.type==="mono-list") return s.category;
  if(s.type==="mono-detail") return s.drug.name;
}

function renderCrumbs(){
  const el = document.getElementById("crumbs");
  el.innerHTML = "";
  stack.forEach((s,i)=>{
    if(i>0){ const sep=document.createElement("span"); sep.className="sep"; sep.textContent="›"; el.appendChild(sep); }
    if(i===stack.length-1){
      const cur=document.createElement("span"); cur.className="current"; cur.textContent=crumbLabel(s); el.appendChild(cur);
    } else {
      const btn=document.createElement("button");
      btn.textContent=crumbLabel(s);
      btn.addEventListener("click", ()=>{ history.go(-(stack.length-1-i)); });
      el.appendChild(btn);
    }
  });
}

      <div id="ix_result"></div>
    `;
    content.appendChild(checkerCard);

    const addSel=$('#ix_add',checkerCard), chipsDiv=$('#ix_chips',checkerCard), resultDiv=$('#ix_result',checkerCard);
    let selectedIds = [];

    function renderChips(){
      chipsDiv.innerHTML = selectedIds.map(id=>{
        const d = drugById(id);
        return `<span class="chip">${d.name}${d.cat==='external'?' <em>(external)</em>':''} <button type="button" class="chip-x" data-id="${id}" aria-label="Remove ${d.name}">✕</button></span>`;
      }).join('');
      chipsDiv.querySelectorAll('.chip-x').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          selectedIds = selectedIds.filter(id=>id!==btn.dataset.id);
          renderChips(); updateIxResult();
        });
      });
    }

    function updateIxResult(){
      if(selectedIds.length===0){ resultDiv.innerHTML=''; return; }
      if(selectedIds.length===1){ resultDiv.innerHTML='<div class="interp" style="margin-top:12px;color:var(--muted)">Add at least one more medication to check for interactions.</div>'; return; }

      const flagged=[], clean=[], skipped=[];
      for(let i=0;i<selectedIds.length;i++){
        for(let j=i+1;j<selectedIds.length;j++){
          const a=selectedIds[i], b=selectedIds[j], da=drugById(a), db=drugById(b);
          if(da.cat==='external' && db.cat==='external'){ skipped.push([da,db]); continue; }

function makeTile(icon,label,cap,onclick){
  const t=document.createElement("button"); t.className="tile";
  t.innerHTML = `<span class="icon">${iconHtml(icon)}</span><span class="label">${label}</span><span class="cap">${cap}</span>`;
  t.addEventListener("click", onclick);
  return t;
}

history.replaceState({navStackLen: 1}, "");
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      // Check for a newer version whenever the app is opened/refocused
      reg.update();
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") reg.update();
      });
    }).catch(()=>{ /* fails silently if sw.js isn't hosted alongside this file yet */ });

    // When the new service worker takes control, reload once to show the update
    let reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}

setTimeout(()=>{
