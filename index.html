<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>AMS Team Dashboard · Kuwait Hospital</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#212A5F">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #EDF1EF;
    --surface: #FFFFFF;
    --ink: #10231C;
    --ink-soft: #5E6B65;
    --accent-blue: #0E7A57;
    --teal: #0E7A57;
    --teal-deep: #0A5A40;
    --amber: #A96B14;
    --amber-soft: #FAF1E1;
    --rose: #B23A3A;
    --rose-soft: #FBEBEB;
    --border: #DCE4E0;
    --border-soft: #EBF0ED;
    /* brand / crest */
    --brand: #212A5F;
    --brand-2: #2E3A78;
    --brand-deep: #141A3E;
    --gold: #C8A24B;
    --kw-red: #CE1126;
    --shadow-sm: 0 1px 2px rgba(16,35,28,.05);
    --shadow-md: 0 6px 22px rgba(16,35,28,.10);
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Sora', sans-serif;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; }
  html,body{ margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--sans); }
  ::selection{ background: var(--teal); color:#fff; }

  #app{ max-width:1240px; margin:0 auto; padding:0 0 80px; }

  /* ===== Command bar header ===== */
  .topbar{ background:linear-gradient(135deg, var(--brand-deep) 0%, var(--brand) 55%, var(--brand-2) 100%); color:#fff; padding:22px 30px 24px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; box-shadow:var(--shadow-md); position:relative; overflow:hidden; border-radius:0 0 22px 22px; }
  .topbar::after{ content:''; position:absolute; right:-60px; top:-60px; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle, rgba(200,162,75,.20), transparent 70%); pointer-events:none; }
  .brand{ display:flex; align-items:center; gap:16px; z-index:1; }
  .crest{ width:64px; height:64px; flex:none; background:#fff; border-radius:15px; padding:8px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(0,0,0,.22); }
  .crest img{ width:100%; height:100%; object-fit:contain; display:block; }
  .brand-txt .eyebrow{ font-family:var(--sans); font-weight:700; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
  .brand-txt h1{ font-family:var(--serif); font-weight:800; font-size:27px; margin:2px 0 0; letter-spacing:-.02em; line-height:1.05; color:#fff; }
  .brand-txt .brand-sub{ font-family:var(--sans); font-weight:500; font-size:12.5px; color:rgba(255,255,255,.72); margin-top:3px; }
  .topbar-right{ z-index:1; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  .today{ font-family:var(--sans); font-weight:500; font-size:12px; color:rgba(255,255,255,.72); text-align:right; }
  .today b{ color:#fff; display:block; font-family:var(--serif); font-size:15px; font-weight:700; letter-spacing:-.01em; }
  .live-dot{ display:inline-flex; align-items:center; gap:6px; font-family:var(--sans); font-weight:600; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:rgba(255,255,255,.85); background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); padding:4px 10px; border-radius:20px; }
  .live-dot::before{ content:''; width:7px; height:7px; border-radius:50%; background:#66E0A3; box-shadow:0 0 0 3px rgba(102,224,163,.25); }
  .content{ padding:22px 30px 0; }

  .toolbar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:20px; }
  .search{ flex:1; min-width:180px; }
  input, select, textarea{ font-family:var(--sans); font-size:14px; color:var(--ink); background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 11px; }
  input:focus, select:focus, textarea:focus{ outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(31,122,92,.14); }
  .search input{ width:100%; }

  .wardtabs{ display:flex; gap:6px; flex-wrap:wrap; }
  .wardtab{ font-family:var(--sans); font-weight:700; font-size:12px; padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); cursor:pointer; color:var(--ink-soft); white-space:nowrap; }
  .wardtab.active{ background:var(--ink); color:#fff; border-color:var(--ink); }

  .btn{ font-family:var(--sans); font-weight:800; font-size:13.5px; padding:9px 18px; border-radius:12px; border:1px solid var(--ink); background:var(--ink); color:#fff; cursor:pointer; white-space:nowrap; }
  .btn:hover{ background:var(--teal-deep); border-color:var(--teal-deep); }
  .btn.ghost{ background:transparent; color:var(--ink); }
  .btn.ghost:hover{ background:var(--border-soft); }
  .btn.small{ padding:7px 13px; font-size:12.5px; border-radius:10px; }
  .btn.tiny{ padding:4px 9px; font-size:11.5px; border-radius:8px; }
  .btn.danger{ background:var(--rose); border-color:var(--rose); }
  .btn.danger:hover{ background:#7A2323; }
  .btn.amber{ background:var(--amber); border-color:var(--amber); }
  .btn.amber:hover{ background:#a5661b; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:14px; }
  .empty{ font-family:var(--serif); font-weight:600; color:var(--ink-soft); font-size:15.5px; padding:40px 10px; text-align:center; border:1px dashed var(--border); border-radius:16px; }

  .card{ background:var(--surface); border:1px solid var(--border); border-left:5px solid var(--teal); border-radius:16px; padding:16px 17px; cursor:pointer; position:relative; transition:box-shadow .15s, transform .15s; box-shadow:var(--shadow-sm); }
  .card:hover{ box-shadow:var(--shadow-md); transform:translateY(-2px); }
  .card.alert{ border-left-color:var(--rose); }
  .card.review{ border-left-color:var(--amber); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .card-name{ font-family:var(--serif); font-weight:800; font-size:17px; line-height:1.2; color:var(--ink); }
  .card-mrn{ font-family:var(--sans); font-weight:600; font-size:11.5px; color:var(--ink-soft); }
  .card-loc{ font-family:var(--sans); font-weight:700; font-size:11px; background:var(--border-soft); padding:4px 10px; border-radius:20px; color:var(--ink-soft); white-space:nowrap; }
  .card-dx{ font-size:13.5px; margin-top:8px; color:var(--ink); }
  .card-meta{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
  .tag{ font-family:var(--sans); font-weight:800; font-size:10.5px; padding:4px 10px; border-radius:20px; }
  .tag.abx{ background:var(--amber-soft); color:var(--amber); }
  .tag.stale{ background:var(--rose-soft); color:var(--rose); }
  .tag.warn{ background:var(--rose-soft); color:var(--rose); }
  .tag.crit{ background:var(--rose); color:#fff; }
  .tag.pos{ background:var(--rose-soft); color:var(--rose); }
  .tag.dev{ background:var(--border-soft); color:var(--ink-soft); }
  .tag.wound{ background:#F3EAF6; color:#7A4E8C; }
  .tag.infusion{ background:#E6F0FA; color:#1C6DB0; }
  .tag.review{ background:var(--amber-soft); color:var(--amber); }
  .card-updated{ font-family:var(--sans); font-weight:600; font-size:10.5px; color:var(--ink-soft); margin-top:10px; border-top:1px solid var(--border-soft); padding-top:8px; }

  .overlay{ position:fixed; inset:0; background:rgba(20,33,63,.45); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; z-index:50; }
  .modal{ background:var(--surface); border-radius:18px; width:100%; max-width:640px; padding:24px 26px 26px; border:1px solid var(--border); }
  .modal.wide{ max-width:960px; }
  .modal h2{ font-family:var(--serif); font-weight:800; font-size:22px; margin:0 0 4px; color:var(--ink); }
  .modal-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
  .x{ cursor:pointer; font-size:20px; color:var(--ink-soft); background:none; border:none; line-height:1; padding:2px 6px; }
  .x:hover{ color:var(--ink); }

  .field-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:10px; margin-bottom:10px; }
  .field-row.three{ grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); }
  .field-row.four{ grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); }
  .field input, .field select, .field textarea{ min-width:0; max-width:100%; box-sizing:border-box; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-family:var(--sans); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); }
  .field textarea{ resize:vertical; min-height:52px; font-family:var(--sans); }

  .section-label{ font-family:var(--sans); font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--teal); margin:16px 0 8px; padding-top:12px; border-top:1px solid var(--border-soft); display:flex; justify-content:space-between; align-items:center; }
  .section-label:first-of-type{ border-top:none; padding-top:0; margin-top:4px; }
  .subgroup-label{ font-family:var(--sans); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin:10px 0 4px; }

  .modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

  .detail-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .detail-name{ font-family:var(--serif); font-size:24px; font-weight:800; color:var(--ink); }
  .detail-sub{ font-family:var(--sans); font-weight:600; font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .detail-actions{ display:flex; gap:8px; margin:14px 0 6px; flex-wrap:wrap; }
  .tabs{ display:flex; gap:2px; margin:14px 0 4px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .tabbtn{ font-family:var(--sans); font-weight:700; font-size:11.5px; padding:8px 11px; border:none; background:none; cursor:pointer; color:var(--ink-soft); border-bottom:2px solid transparent; }
  .tabbtn.active{ color:var(--teal-deep); border-bottom-color:var(--teal); font-weight:800; }
  .tabpane{ display:none; max-height:480px; overflow-y:auto; padding-right:4px; padding-top:10px;}
  .tabpane.active{ display:block; }

  .timeline{ margin-top:6px; }
  .entry{ border-left:2px solid var(--border); padding:2px 0 16px 16px; position:relative; }
  .entry::before{ content:''; position:absolute; left:-5px; top:5px; width:8px; height:8px; border-radius:50%; background:var(--teal); }
  .entry-date{ font-family:var(--sans); font-weight:800; font-size:12.5px; color:var(--teal-deep); }
  .entry-grid{ display:grid; grid-template-columns:100px 1fr; gap:4px 10px; font-size:13px; margin-top:6px; }
  .entry-grid dt{ font-family:var(--sans); font-weight:700; font-size:10.5px; text-transform:uppercase; color:var(--ink-soft); padding-top:1px; }
  .entry-grid dd{ margin:0; white-space:pre-wrap; }
  .entry-del{ font-family:var(--sans); font-weight:700; font-size:10.5px; color:var(--rose); background:none; border:none; cursor:pointer; margin-top:6px; padding:0; }
  .entry-edit{ font-family:var(--sans); font-weight:700; font-size:10.5px; color:var(--teal-deep); background:none; border:none; cursor:pointer; margin-top:6px; padding:0; }
  .row-actions{ display:flex; gap:12px; }

  .quickform{ background:var(--border-soft); border-radius:14px; padding:12px; margin-top:10px; }

  .stat-strip{ display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:12px; margin:0 0 18px; }
  .stat{ font-family:var(--sans); font-weight:600; font-size:11.5px; color:var(--ink-soft); background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 15px; position:relative; box-shadow:var(--shadow-sm); overflow:hidden; }
  .stat::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--teal); }
  .stat.warn::before{ background:var(--amber); }
  .stat.crit::before{ background:var(--rose); }
  .stat b{ display:block; font-family:var(--serif); font-size:28px; line-height:1; color:var(--ink); font-weight:800; margin-bottom:6px; letter-spacing:-.02em; }
  .stat .stat-note{ display:block; font-weight:500; font-size:10px; color:var(--ink-soft); opacity:.85; margin-top:2px; }

  /* ===== AMS review panel ===== */
  .ams-panel{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px 18px; margin-bottom:18px; box-shadow:var(--shadow-sm); }
  .ams-panel h3{ font-family:var(--serif); font-weight:700; font-size:15px; margin:0; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .ams-panel .ams-count{ font-family:var(--sans); font-weight:700; font-size:11px; background:var(--amber-soft); color:var(--amber); padding:3px 10px; border-radius:20px; }
  .ams-panel.clear{ border-color:#CBE7DA; background:linear-gradient(180deg,#F3FBF7,#fff); }
  .ams-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; }
  .ams-list{ margin-top:12px; display:flex; flex-direction:column; gap:8px; }
  .ams-item{ display:flex; align-items:flex-start; gap:11px; border:1px solid var(--border-soft); border-left:4px solid var(--amber); border-radius:12px; padding:10px 13px; background:#fff; cursor:pointer; transition:box-shadow .15s, border-color .15s; }
  .ams-item:hover{ box-shadow:var(--shadow-md); border-color:var(--border); }
  .ams-item.crit{ border-left-color:var(--rose); }
  .ams-item .who{ font-family:var(--serif); font-weight:700; font-size:13.5px; color:var(--ink); }
  .ams-item .who small{ font-family:var(--sans); font-weight:500; color:var(--ink-soft); font-size:11px; }
  .ams-item .why{ display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
  .ams-flag{ font-family:var(--sans); font-weight:700; font-size:10px; padding:3px 8px; border-radius:8px; background:var(--amber-soft); color:var(--amber); }
  .ams-flag.crit{ background:var(--rose-soft); color:var(--rose); }
  .ams-flag.iv{ background:#E6F0FA; color:#1C6DB0; }
  .ams-empty-good{ font-family:var(--sans); font-weight:600; font-size:13px; color:var(--teal-deep); display:flex; align-items:center; gap:8px; }

  /* ===== Filter chips ===== */
  .filterbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .fchip{ font-family:var(--sans); font-weight:700; font-size:12px; padding:7px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface); cursor:pointer; color:var(--ink-soft); display:inline-flex; align-items:center; gap:7px; }
  .fchip .fnum{ font-size:11px; background:var(--border-soft); color:var(--ink-soft); border-radius:10px; padding:1px 7px; font-weight:800; }
  .fchip.active{ background:var(--teal); color:#fff; border-color:var(--teal); }
  .fchip.active .fnum{ background:rgba(255,255,255,.22); color:#fff; }
  .fchip.review.active{ background:var(--amber); border-color:var(--amber); }
  .fchip.pos.active{ background:var(--rose); border-color:var(--rose); }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:12px; font-size:13px; font-weight:600; font-family:var(--sans); opacity:0; transition:opacity .25s; pointer-events:none; z-index:100;}
  .toast.show{ opacity:1; }

  .pill-list{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .pill{ display:flex; align-items:center; gap:6px; background:var(--border-soft); border:1px solid var(--border); border-radius:20px; padding:5px 6px 5px 13px; font-size:12.5px; font-weight:600; }
  .pill.danger{ background:var(--rose-soft); border-color:#f1c9c9; color:var(--rose); }
  .pill button{ background:var(--surface); border:1px solid var(--border); border-radius:50%; width:18px; height:18px; line-height:1; cursor:pointer; color:var(--ink-soft); font-size:12px; padding:0; }
  .pill.danger button{ background:#fff; }
  .addline{ display:flex; gap:6px; }
  .addline input{ flex:1; }
  .pill button.edit-btn{ background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:11px; padding:0 2px; }
  .pill button.edit-btn:hover{ color:var(--teal-deep); }
  .pill-edit-row{ display:flex; gap:6px; align-items:center; background:var(--surface); border:1px solid var(--teal); border-radius:20px; padding:4px 6px 4px 13px; font-size:12.5px; margin-bottom:6px; }
  .pill-edit-row input{ padding:5px 8px; font-size:12.5px; }

  .labs-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  .labs-table th{ font-family:var(--sans); font-weight:800; font-size:9.5px; text-transform:uppercase; color:var(--ink-soft); text-align:left; padding:6px 6px; border-bottom:1px solid var(--border); white-space:nowrap; }
  .labs-table td{ padding:6px 6px; border-bottom:1px solid var(--border-soft); font-family:var(--mono); white-space:nowrap; }
  .labs-table td.reflo, .labs-table td.refhi{ color:var(--amber); font-weight:700; }
  .labs-table td.crit{ color:#fff; background:var(--rose); font-weight:700; border-radius:6px; }
  .labs-table .datecell{ font-family:var(--sans); font-weight:700; }
  .trend{ font-size:10px; margin-left:2px; }
  .lab-ref{ font-family:var(--sans); font-weight:600; font-size:10px; color:var(--ink-soft); margin-top:6px; }

  /* Wrapping, no-horizontal-scroll layout for vitals & lab panels */
  .reading-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:11px 13px; margin-bottom:8px; }
  .reading-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
  .reading-date{ font-family:var(--sans); font-weight:800; font-size:12.5px; color:var(--ink); }
  .reading-group{ margin-top:8px; }
  .reading-group:first-child{ margin-top:0; }
  .reading-group-title{ font-family:var(--sans); font-weight:700; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:5px; }
  .chipwrap{ display:flex; flex-wrap:wrap; gap:6px; }
  .valchip{ display:inline-flex; align-items:baseline; gap:5px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:4px 9px; font-family:var(--mono); font-size:12.5px; line-height:1.3; }
  .valchip .k{ font-family:var(--sans); font-weight:800; font-size:9.5px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-soft); }
  .valchip .u{ font-size:10px; color:var(--ink-soft); }
  .valchip .tr{ font-size:10px; }
  .valchip.reflo, .valchip.refhi{ border-color:#e7cf9f; background:var(--amber-soft); color:var(--amber); }
  .valchip.reflo .k, .valchip.refhi .k, .valchip.reflo .u, .valchip.refhi .u{ color:var(--amber); }
  .valchip.crit{ border-color:var(--rose); background:var(--rose); color:#fff; }
  .valchip.crit .k, .valchip.crit .u{ color:#fff; }

  .abx-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:11px 13px; margin-bottom:8px; }
  .abx-card.ended{ opacity:.55; }
  .abx-card.overdue{ border-color:var(--amber); background:var(--amber-soft); }
  .abx-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .abx-name{ font-weight:800; font-size:14px; font-family:var(--serif); }
  .abx-meta{ font-family:var(--sans); font-weight:600; font-size:11px; color:var(--ink-soft); margin-top:3px; }
  .abx-dur{ font-family:var(--sans); font-weight:700; font-size:11px; margin-top:5px; }
  .abx-dur.ok{ color:var(--teal-deep); }
  .abx-dur.due{ color:var(--amber); font-weight:800; }

  .warn-panel{ border-radius:14px; padding:11px 14px; margin-bottom:8px; font-size:13px; }
  .warn-panel.high{ background:var(--rose-soft); border:1px solid #f1c9c9; }
  .warn-panel.med{ background:var(--amber-soft); border:1px solid #f0d9b3; }
  .warn-panel.crit{ background:var(--rose); color:#fff; border:1px solid var(--rose); }
  .warn-title{ font-weight:800; font-size:12.5px; }
  .warn-disclaimer{ font-family:var(--sans); font-weight:600; font-size:10.5px; color:var(--ink-soft); margin-top:8px; border-top:1px dashed var(--border); padding-top:8px; }

  .badge{ font-family:var(--sans); font-size:10.5px; padding:3px 10px; border-radius:12px; font-weight:800; }
  .badge.Positive{ background:var(--rose); color:#fff; }
  .badge.Negative{ background:var(--teal); color:#fff; }
  .badge.Pending{ background:var(--amber-soft); color:var(--amber); }
  .badge.Indeterminate{ background:var(--border-soft); color:var(--ink-soft); }

  .trendbtn{ font-family:var(--sans); font-weight:800; font-size:11px; background:var(--border-soft); border:1px solid var(--border); border-radius:10px; padding:6px 12px; cursor:pointer; color:var(--teal-deep); }
  .trendbtn:hover{ background:var(--teal); color:#fff; border-color:var(--teal); }

  @media print{
    .toolbar, .topbar-right, #btnAddPatient, .btn, .search, .filterbar, .live-dot, .ams-panel{ display:none !important; }
    .topbar{ background:none !important; color:var(--ink) !important; box-shadow:none; padding:0 0 12px; }
    .topbar::after{ display:none; }
    .brand-txt h1, .today b{ color:var(--ink) !important; }
    .brand-txt .brand-sub, .today{ color:var(--ink-soft) !important; }
    .content{ padding-top:14px; }
    .overlay{ position:static; background:none; padding:0; }
    .modal{ border:none; box-shadow:none; max-width:100%; }
  }
  @media (max-width:640px){
    .topbar{ padding:16px 18px; }
    .content{ padding:18px 16px 0; }
    .topbar-right{ align-items:flex-start; }
  }

  @media (max-width:600px){
    .field-row, .field-row.three, .field-row.four{ grid-template-columns:1fr; }
    .entry-grid{ grid-template-columns:80px 1fr; }
  }
</style>

function downloadBackup(){
  try{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `ams-backup-${todayStr()}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    showToast('Backup file downloaded');
  }catch(e){ showToast('Backup failed'); console.error(e); }
}
function restoreBackup(file){
  const r = new FileReader();
  r.onload = ()=>{
    let data;
    try{ data = JSON.parse(r.result); }catch(e){ showToast('That file is not a valid backup'); return; }
    if(!data || !Array.isArray(data.patients)){ showToast('That file is not a valid AMS backup'); return; }
    if(!confirm('Restore this backup? It REPLACES all data currently on this device.')) return;
    state = data; migrate(); saveData(); render();
    showToast('Backup restored');
  };
  r.readAsText(file);
}
function migrate(){
  state.labs = state.labs || [];
  state.abx = state.abx || [];
  state.entries = state.entries || [];
  state.vitals = state.vitals || [];
  state.devices = state.devices || [];

    if(typeof p.diagnosis === 'string'){ p.diagnoses = p.diagnosis ? [{id:uid(), text:p.diagnosis}] : []; delete p.diagnosis; }

  });
}

/* ================= Flagging helpers ================= */
function flagFor(field, val){
  if(val===''||val==null||isNaN(val)) return '';
  val = parseFloat(val);
  if(field.crit){
    if(field.crit.lo!=null && val<field.crit.lo) return 'crit';
    if(field.crit.hi!=null && val>field.crit.hi) return 'crit';
  }
  if(field.ref){
    if(val<field.ref[0]) return 'reflo';
    if(val>field.ref[1]) return 'refhi';
  }
  return '';
}
function computeMAP(v){
  if(v.sbp==='' || v.dbp==='' || v.sbp==null || v.dbp==null) return null;
  const sbp = parseFloat(v.sbp), dbp = parseFloat(v.dbp);
  if(isNaN(sbp)||isNaN(dbp)) return null;
  return Math.round((dbp + (sbp-dbp)/3)*10)/10;
}
/* Parse a "120/80" style string into {sbp,dbp}. Tolerates spaces and common separators. */
function parseBP(str){
  if(str==null) return {sbp:'',dbp:''};
  const m = String(str).match(/(-?\d+(?:\.\d+)?)\s*[\/\\\-\s]\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {sbp:m[1], dbp:m[2]};
  const one = String(str).match(/-?\d+(?:\.\d+)?/);
  return {sbp: one?one[0]:'', dbp:''};
}
/* Best display for BP on a record: the stored bp string, or reconstructed from sbp/dbp. */
function bpDisplay(r){
  if(r.bp) return r.bp;
  if((r.sbp!==''&&r.sbp!=null) || (r.dbp!==''&&r.dbp!=null)) return `${r.sbp||'—'}/${r.dbp||'—'}`;
  return '';
}
/* Worst flag across systolic & diastolic, for colouring the single BP cell. */
function bpFlag(r){
  const s = flagFor(SBP_FIELD, r.sbp), d = flagFor(DBP_FIELD, r.dbp);
  if(s==='crit'||d==='crit') return 'crit';
  if(s==='refhi'||d==='refhi'||s==='reflo'||d==='reflo') return s||d;
  return '';
}

/* Critical alerts drawn from the most recent lab panel + most recent vitals row */
function getCriticalAlerts(p){
  const alerts = [];
  const latestLab = state.labs.filter(l=>l.patientId===p.id).sort((a,b)=> (b.date+(b.time||'')).localeCompare(a.date+(a.time||'')))[0];
  if(latestLab){
    LAB_FIELDS.forEach(f=>{
      const flag = flagFor(f, latestLab[f.k]);
      if(flag==='crit') alerts.push(`${f.label} ${latestLab[f.k]} ${f.unit} is critically ${latestLab[f.k]<f.ref[0]?'low':'high'} (${fmtDate(latestLab.date)})`);
    });
  }
  const latestVit = state.vitals.filter(v=>v.patientId===p.id).sort((a,b)=> (b.date+(b.time||'')).localeCompare(a.date+(a.time||'')))[0];
  if(latestVit){
    VITAL_FIELDS.forEach(f=>{
      if(f.type==='bp') return;
      const flag = flagFor(f, latestVit[f.k]);
      if(flag==='crit') alerts.push(`${f.label} ${latestVit[f.k]} ${f.unit} is critical (${fmtDate(latestVit.date)})`);
    });
    [SBP_FIELD,DBP_FIELD].forEach(f=>{
      if(flagFor(f, latestVit[f.k])==='crit') alerts.push(`${f.label} ${latestVit[f.k]} mmHg is critical (${fmtDate(latestVit.date)})`);
    });
    const map = computeMAP(latestVit);
    if(map!=null && flagFor(MAP_FIELD, map)==='crit') alerts.push(`MAP ${map} mmHg is critically low (${fmtDate(latestVit.date)})`);
  }
  return alerts;
}

/* ================= Interaction engine ================= */
function matchGroups(name){
  const n = (name||'').toLowerCase();
  const hits = [];
  for(const g in DRUG_GROUPS){ if(DRUG_GROUPS[g].some(kw => n.includes(kw))) hits.push(g); }
  return hits;
}
function isAbxEnded(a){ return a.endDate && a.endDate <= todayStr(); }
function checkInteractions(p){
  const active = state.abx.filter(a=>a.patientId===p.id && !isAbxEnded(a));
  const meds = (p.otherMeds||[]).map(m=>({name:m.name}));
  const abxList = active.map(a=>({name:a.name}));
  const all = [...abxList, ...meds].filter(d=>d.name && d.name.trim());
  const warnings = [];
  for(let i=0;i<all.length;i++){
    for(let j=i+1;j<all.length;j++){
      const gi = matchGroups(all[i].name), gj = matchGroups(all[j].name);
      INTERACTION_RULES.forEach(rule=>{
        const [g1,g2] = rule.g;
        const hit = (gi.includes(g1)&&gj.includes(g2)) || (gi.includes(g2)&&gj.includes(g1));
        if(hit) warnings.push({sev:rule.sev, text:`${all[i].name} + ${all[j].name}: ${rule.text}`});
      });
    }
  }
  (p.allergies||[]).forEach(al=>{
    const allergen = (al.allergen||'').toLowerCase().trim();
    if(!allergen) return;
    all.forEach(d=>{
      const dn = (d.name||'').toLowerCase();
      if(dn && dn.includes(allergen)){
        warnings.push({sev:'high', text:`${d.name} — direct name match with documented allergy to "${al.allergen}".`});
        return;
      }
      const groups = matchGroups(d.name);
      for(const key in ALLERGY_CROSS){
        if(allergen.includes(key)){
          ALLERGY_CROSS[key].forEach(gr=>{
            if(groups.includes(gr)) warnings.push({sev:'high', text:`${d.name} — possible cross-reactivity with documented "${al.allergen}" allergy (${gr} class).`});
          });
        }
      }
    });
  });
  const seen = new Set();
  return warnings.filter(w=>{ if(seen.has(w.text)) return false; seen.add(w.text); return true; });
}

/* ---- AMS review engine: which active antimicrobials need a stewardship review ---- */
function abxReviewFlags(a){
  if(isAbxEnded(a)) return [];
  const flags = [];
  const dayN = a.startDate ? (daysBetween(a.startDate, todayStr())+1) : null;
  const planned = a.prespecifiedDuration && /^\d+/.test(a.prespecifiedDuration) ? parseInt(a.prespecifiedDuration,10) : null;
  if(planned!=null && dayN!=null && dayN>planned) flags.push({sev:'crit', label:`Past planned ${planned}d (day ${dayN})`});
  if(!a.endDate && !a.prespecifiedDuration) flags.push({sev:'warn', label:'No stop / review date'});
  if(!a.indication || !a.indication.trim()) flags.push({sev:'warn', label:'No indication documented'});
  if((a.route||'')==='IV' && dayN!=null && dayN>=3) flags.push({sev:'iv', label:`IV day ${dayN} — review IV→PO`});
  if(dayN!=null && dayN>=7 && planned==null) flags.push({sev:'warn', label:`Day ${dayN}, no planned stop`});
  return flags;
}
function patientAbxReviews(p){
  const items = [];
  state.abx.filter(a=>a.patientId===p.id && !isAbxEnded(a)).forEach(a=>{
    const flags = abxReviewFlags(a);
    if(flags.length) items.push({abx:a, flags});
  });
  return items;
}
function deviceReviewItems(p){
  return activeDevicesByCat(p.id,'device').filter(d=>{
    const rd = deviceReviewDays(d.type);
    if(!rd || !d.startDate) return false;
    return (daysBetween(d.startDate, todayStr())+1) > rd;
  });
}
function patientNeedsReview(p){ return patientAbxReviews(p).length>0 || deviceReviewItems(p).length>0; }
function isStale(patientId){
  const le = state.entries.filter(e=>e.patientId===patientId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const ll = state.labs.filter(l=>l.patientId===patientId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const lv = state.vitals.filter(v=>v.patientId===patientId).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const mostRecent = [le?.date, ll?.date, lv?.date].filter(Boolean).sort().reverse()[0];
  return !mostRecent || mostRecent !== todayStr();
}
function renderGrid(){
  let list = state.patients.filter(p=>p.active);
  if(currentWard !== 'All') list = list.filter(p => (p.ward||'Unassigned')===currentWard);
  if(amsFilter==='abx') list = list.filter(p=>state.abx.some(a=>a.patientId===p.id && !isAbxEnded(a)));
  else if(amsFilter==='review') list = list.filter(patientNeedsReview);
  else if(amsFilter==='positive') list = list.filter(p=>getPositiveInvestigations(p).length>0);
  if(searchTerm){
    const s = searchTerm.toLowerCase();
    list = list.filter(p => [p.name,p.mrn,p.doctor,(p.diagnoses||[]).map(d=>d.text).join(' ')].join(' ').toLowerCase().includes(s));
  }
  list.sort((a,b)=> (a.ward||'').localeCompare(b.ward||'') || (a.bed||'').localeCompare(b.bed||''));

  const grid = document.getElementById('patientGrid');
  if(list.length===0){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">No patients here yet. Add one to start the ledger.</div>`;
    return;
  }
  grid.innerHTML = list.map(p=>{
    const stale = isStale(p.id);
    const abxActive = latestAbxActive(p.id);
    const warnings = checkInteractions(p);
    const critical = getCriticalAlerts(p);

    const devices = activeDevicesByCat(p.id,'device');
    const wounds = activeDevicesByCat(p.id,'wound');
    const infusions = activeDevicesByCat(p.id,'infusion');
    const reviews = patientAbxReviews(p).length + deviceReviewItems(p).length;
    const dxText = (p.diagnoses||[]).map(d=>d.text).join(' · ');
    return `
    <div class="card ${(warnings.length||critical.length)?'alert':(reviews?'review':'')}" data-id="${p.id}">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-mrn">${esc(p.mrn||'no MRN')} · ${esc(p.age||'?')}${p.sex?('/'+esc(p.sex)):''}</div>
        </div>
        <div class="card-loc">${esc(p.ward||'—')}${p.bed?(' · '+esc(p.bed)):''}</div>
      </div>
      <div class="card-dx">${dxText || '<span style="color:var(--ink-soft)">No diagnosis logged</span>'}</div>
      <div class="card-meta">
        ${critical.length ? `<span class="tag crit">⚠ ${critical.length} critical value${critical.length>1?'s':''}</span>` : ''}
        ${abxActive.length ? `<span class="tag abx">${abxActive.length} antimicrobial${abxActive.length>1?'s':''}</span>` : ''}
        ${reviews ? `<span class="tag review">⚑ ${reviews} AMS review${reviews>1?'s':''}</span>` : ''}
        ${devices.length ? `<span class="tag dev">${devices.length} device${devices.length>1?'s':''}/line${devices.length>1?'s':''}</span>` : ''}
        ${infusions.length ? `<span class="tag infusion">${infusions.length} infusion${infusions.length>1?'s':''}</span>` : ''}
        ${wounds.length ? `<span class="tag wound">${wounds.length} pressure injury${wounds.length>1?'/wound(s)':''}</span>` : ''}
        ${positives.length ? `<span class="tag pos">${positives.length} positive result${positives.length>1?'s':''}</span>` : ''}
        ${warnings.length ? `<span class="tag warn">⚠ ${warnings.length} interaction flag${warnings.length>1?'s':''}</span>` : ''}
        ${stale ? `<span class="tag stale">No entry today</span>` : ''}
      </div>

  }).join('');
  document.querySelectorAll('.card').forEach(c=>{ c.onclick = ()=> openDetail(c.dataset.id); });

      }).join('');

      return `<div class="reading-card">
        <div class="reading-head">
          <span class="reading-date">${fmtDate(r.date)}${r.time?(' · '+esc(r.time)):''}</span>
          <div class="row-actions"><button class="entry-edit" data-edit-vital="${r.id}">edit</button><button class="entry-del" data-del-vital="${r.id}">delete</button></div>
        </div>
        <div class="chipwrap">${chips}${mapChip}</div>
      </div>`;
    }).join('') +
    `<div class="lab-ref">Reference ranges are general adult approximations — confirm against your unit's protocol. Red chip = critical threshold crossed; amber = outside normal reference range.</div>`;
  }
  return `
    <div class="section-label">Vital signs</div>
    <div style="display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap;">
      <button class="btn small" id="addVitalBtn">+ Add reading</button>
      <button class="trendbtn" id="vitalTrendBtn">📈 View trend</button>
    </div>
    <div id="vitalFormHost"></div>
    ${body}
  `;
}

/* ----- Labs pane (grouped by system) ----- */
function renderLabsPane(p){
  const chron = state.labs.filter(l=>l.patientId===p.id).sort((a,b)=> (a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
  const displayRows = [...chron].reverse();
  let body = '';
  if(chron.length===0){
    body = `<div class="empty">No lab panels yet.</div>`;
  } else {
    body = displayRows.map(r=>{
      const idx = chron.findIndex(x=>x.id===r.id);
      const prev = idx>0 ? chron[idx-1] : null;
      const groups = LAB_GROUP_ORDER.map(group=>{
        const fields = LAB_FIELDS.filter(f=>f.group===group);
        const chips = fields.map(f=>{
          const val = r[f.k];
          if(val===''||val==null) return '';
          const flag = flagFor(f, val);
          let trend = '';
          if(prev && prev[f.k]!==''&&prev[f.k]!=null && !isNaN(val)){
            const pv = parseFloat(prev[f.k]);
            if(!isNaN(pv)){
              if(parseFloat(val) > pv) trend = ' <span class="tr" style="color:var(--rose)">▲</span>';
              else if(parseFloat(val) < pv) trend = ' <span class="tr" style="color:var(--teal-deep)">▼</span>';
            }
          }
          return `<span class="valchip ${flag}"><span class="k">${f.label}</span>${esc(val)} <span class="u">${f.unit}</span>${trend}</span>`;
        }).join('');
        if(!chips) return '';
        return `<div class="reading-group"><div class="reading-group-title">${group}</div><div class="chipwrap">${chips}</div></div>`;
      }).join('');
      const bodyInner = groups || `<div class="lab-ref">No values recorded in this panel.</div>`;
      return `<div class="reading-card">
        <div class="reading-head">
          <span class="reading-date">${fmtDate(r.date)}${r.time?(' · '+esc(r.time)):''}</span>
          <div class="row-actions"><button class="entry-edit" data-edit-lab="${r.id}">edit</button><button class="entry-del" data-del-lab="${r.id}">delete</button></div>
        </div>
        ${bodyInner}
      </div>`;
    }).join('') +
    `<div class="lab-ref">Values reported in SI/metric units. Reference ranges are general adult approximations — confirm against your lab's reported normals. ▲/▼ compares to the prior panel. Red chip = critical threshold; amber = outside reference range.</div>`;
  }
  return `
    <div class="section-label">Lab panels — grouped by system</div>
    <div style="display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap;">
      <button class="btn small" id="addLabBtn">+ Add lab panel</button>
      <button class="trendbtn" id="labTrendBtn">📈 View trend</button>
    </div>
    <div id="labFormHost"></div>
    ${body}
  `;
}

/* ----- Antimicrobials pane ----- */
function abxDurationLabel(a){
  if(a.endDate){
    const dur = daysBetween(a.startDate, a.endDate) + 1;
    const ended = a.endDate <= todayStr();
    return `<span class="abx-dur ${ended?'ok':'due'}">${ended? 'Completed course: ' : 'Planned stop: '}${dur} day${dur!==1?'s':''} (${fmtDate(a.startDate)} → ${fmtDate(a.endDate)})</span>`;
  }
  const dayN = a.startDate ? (daysBetween(a.startDate, todayStr())+1) : '?';
  const planned = a.prespecifiedDuration ? ` · planned duration: ${esc(a.prespecifiedDuration)}` : '';
  const overdue = a.prespecifiedDuration && /^\d+/.test(a.prespecifiedDuration) && dayN > parseInt(a.prespecifiedDuration,10);
  return `<span class="abx-dur ${overdue?'due':'ok'}">Day ${dayN} of therapy${planned}${overdue?' — review, past planned duration':''}</span>`;
}
function renderAbxPane(p){
  const rows = state.abx.filter(a=>a.patientId===p.id).sort((a,b)=> (b.startDate||'').localeCompare(a.startDate||''));
  const cards = rows.length ? rows.map(a=>{
    const ended = isAbxEnded(a);
    const dayN = a.startDate ? (daysBetween(a.startDate, todayStr())+1) : null;
    const overdue = !ended && a.prespecifiedDuration && /^\d+/.test(a.prespecifiedDuration) && dayN > parseInt(a.prespecifiedDuration,10);
    const flags = abxReviewFlags(a);
    return `<div class="abx-card ${ended?'ended':''} ${overdue?'overdue':''}">
      <div class="abx-top">
        <div>
          <div class="abx-name">${esc(a.name)} ${ended?'<span style="font-weight:400; color:var(--ink-soft); font-size:11px;">(completed)</span>':''}</div>
          <div class="abx-meta">${esc(a.dose||'—')} · ${esc(a.frequency||'—')} · ${esc(a.route||'—')}${a.indication?(' · for '+esc(a.indication)):''}</div>
        </div>
        <div class="row-actions"><button class="entry-edit" data-edit-abx="${a.id}">edit</button><button class="entry-del" data-del-abx="${a.id}">delete</button></div>
      </div>
      ${abxDurationLabel(a)}
      ${flags.length ? `<div class="why" style="margin-top:8px;">${flags.map(f=>`<span class="ams-flag ${f.sev==='crit'?'crit':(f.sev==='iv'?'iv':'')}">⚑ ${esc(f.label)}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('') : `<div class="empty">No antimicrobials logged.</div>`;
  return `
    <div class="section-label">Antimicrobial courses</div>
    <button class="btn small" id="addAbxBtn" style="margin-bottom:10px;">+ Add antimicrobial</button>
    <div id="abxFormHost"></div>
    ${cards}
  `;
}

/* ----- Devices & lines pane ----- */
function deviceDurationLabel(d){
  const cat = deviceCategory(d.type);
  if(d.endDate){
    const dur = daysBetween(d.startDate, d.endDate) + 1;
    return `<span class="abx-dur ok">${CAT_META[cat].verb}: ${dur} day${dur!==1?'s':''} (${fmtDate(d.startDate)} → ${fmtDate(d.endDate)})</span>`;
  }
  const dayN = d.startDate ? (daysBetween(d.startDate, todayStr())+1) : '?';
  if(cat==='device'){
    const reviewAt = deviceReviewDays(d.type);
    const overdue = reviewAt && dayN > reviewAt;
    return `<span class="abx-dur ${overdue?'due':'ok'}">Day ${dayN} in situ${reviewAt?` · review at day ${reviewAt}`:''}${overdue?' — consider review / removal':''}</span>`;
  }
  if(cat==='wound') return `<span class="abx-dur ok">Day ${dayN} · reassess &amp; document staging</span>`;
  return `<span class="abx-dur ok">Day ${dayN} running</span>`;
}
function deviceCardHTML(d){
  const cat = deviceCategory(d.type);
  const ended = !!d.endDate;
  const dayN = d.startDate ? (daysBetween(d.startDate, todayStr())+1) : null;
  const overdue = !ended && cat==='device' && deviceReviewDays(d.type) && dayN > deviceReviewDays(d.type);
  const endedLabel = ended ? `<span style="font-weight:400; color:var(--ink-soft); font-size:11px;">(${cat==='wound'?'resolved':(cat==='infusion'?'stopped':'removed')})</span>` : '';
  return `<div class="abx-card ${ended?'ended':''} ${overdue?'overdue':''}">
    <div class="abx-top">
      <div>
        <div class="abx-name">${esc(d.type)} ${endedLabel}</div>
        <div class="abx-meta">${esc(d.detail||'—')}</div>
      </div>
      <div class="row-actions"><button class="entry-edit" data-edit-dev="${d.id}">edit</button><button class="entry-del" data-del-dev="${d.id}">delete</button></div>
    </div>
    ${deviceDurationLabel(d)}
  </div>`;
}
function renderDevicesPane(p){
  const rows = state.devices.filter(d=>d.patientId===p.id).sort((a,b)=> (b.startDate||'').localeCompare(a.startDate||''));
  let body;
  if(rows.length===0){
    body = `<div class="empty">Nothing logged yet. Add a line, device, pressure injury, or infusion.</div>`;
  } else {
    body = ['device','wound','infusion'].map(cat=>{
      const group = rows.filter(d=>deviceCategory(d.type)===cat);
      if(!group.length) return '';
      return `<div class="subgroup-label">${CAT_META[cat].label}</div>${group.map(deviceCardHTML).join('')}`;
    }).join('');
  }
  return `
    <div class="section-label">Lines, devices, skin &amp; infusions</div>
    <button class="btn small" id="addDevBtn" style="margin-bottom:10px;">+ Add entry</button>
    <div style="font-family:var(--sans); font-size:10.5px; color:var(--ink-soft); margin-bottom:10px;">Only invasive lines &amp; devices count toward the "devices in situ" metric and trigger review reminders. Pressure injuries and infusions are logged here but tracked separately.</div>
    <div id="devFormHost"></div>
    ${body}
  `;
}

/* ================= Wiring pane events ================= */
function wirePaneEvents(overlay, p){
  // Diagnoses
  overlay.querySelector('#addDxBtn')?.addEventListener('click', async ()=>{
    const inp = overlay.querySelector('#newDx'); const v = inp.value.trim(); if(!v) return;
    p.diagnoses.push({id:uid(), text:v}); await saveData(); renderDetail(overlay); render();
  });
  overlay.querySelectorAll('[data-del-dx]').forEach(b=> b.onclick = async ()=>{ p.diagnoses = p.diagnoses.filter(d=>d.id!==b.dataset.delDx); await saveData(); renderDetail(overlay); render(); });
  overlay.querySelectorAll('[data-editbtn-dx]').forEach(b=> b.onclick = ()=>{ editingDxId = b.dataset.editbtnDx; renderDetail(overlay); });
  overlay.querySelectorAll('[data-cancel-dx]').forEach(b=> b.onclick = ()=>{ editingDxId = null; renderDetail(overlay); });
  overlay.querySelectorAll('[data-save-dx]').forEach(b=> b.onclick = async ()=>{
    const id = b.dataset.saveDx; const inp = overlay.querySelector(`[data-editinput-dx="${id}"]`); const v = inp.value.trim(); if(!v) return;
    const d = p.diagnoses.find(x=>x.id===id); if(d) d.text = v; editingDxId = null; await saveData(); renderDetail(overlay); render();
  });
  // Allergies

    const a = overlay.querySelector('#newAlAllergen'), r = overlay.querySelector('#newAlReaction'); const v = a.value.trim(); if(!v) return;
    p.allergies.push({id:uid(), allergen:v, reaction:r.value.trim()}); await saveData(); renderDetail(overlay); render();
  });
  overlay.querySelectorAll('[data-del-al]').forEach(b=> b.onclick = async ()=>{ p.allergies = p.allergies.filter(x=>x.id!==b.dataset.delAl); await saveData(); renderDetail(overlay); render(); });
  overlay.querySelectorAll('[data-editbtn-al]').forEach(b=> b.onclick = ()=>{ editingAlId = b.dataset.editbtnAl; renderDetail(overlay); });
  overlay.querySelectorAll('[data-cancel-al]').forEach(b=> b.onclick = ()=>{ editingAlId = null; renderDetail(overlay); });

    const v = allergenInp.value.trim(); if(!v) return;

  });
  // Other meds
  overlay.querySelector('#addMedBtn')?.addEventListener('click', async ()=>{
    const inp = overlay.querySelector('#newMed'); const v = inp.value.trim(); if(!v) return;
    p.otherMeds.push({id:uid(), name:v}); await saveData(); renderDetail(overlay); render();
  });
  overlay.querySelectorAll('[data-del-med]').forEach(b=> b.onclick = async ()=>{ p.otherMeds = p.otherMeds.filter(x=>x.id!==b.dataset.delMed); await saveData(); renderDetail(overlay); render(); });
  overlay.querySelectorAll('[data-editbtn-med]').forEach(b=> b.onclick = ()=>{ editingMedId = b.dataset.editbtnMed; renderDetail(overlay); });
  overlay.querySelectorAll('[data-cancel-med]').forEach(b=> b.onclick = ()=>{ editingMedId = null; renderDetail(overlay); });
  overlay.querySelectorAll('[data-save-med]').forEach(b=> b.onclick = async ()=>{
    const id = b.dataset.saveMed; const inp = overlay.querySelector(`[data-editinput-med="${id}"]`); const v = inp.value.trim(); if(!v) return;
    const m = p.otherMeds.find(x=>x.id===id); if(m) m.name = v; editingMedId = null; await saveData(); renderDetail(overlay); render();
  });

  // Vitals
  overlay.querySelector('#addVitalBtn')?.addEventListener('click', ()=> openVitalForm(overlay, p, null));
  overlay.querySelector('#vitalTrendBtn')?.addEventListener('click', ()=> openTrendModal(p, 'vital'));
  overlay.querySelectorAll('[data-edit-vital]').forEach(b=> b.onclick = ()=>{ const rec = state.vitals.find(x=>x.id===b.dataset.editVital); openVitalForm(overlay, p, rec); });
  overlay.querySelectorAll('[data-del-vital]').forEach(b=> b.onclick = async ()=>{ if(!confirm('Delete this vitals reading?')) return; state.vitals = state.vitals.filter(x=>x.id!==b.dataset.delVital); await saveData(); renderDetail(overlay); render(); });

  // Labs
  overlay.querySelector('#addLabBtn')?.addEventListener('click', ()=> openLabForm(overlay, p, null));
  overlay.querySelector('#labTrendBtn')?.addEventListener('click', ()=> openTrendModal(p, 'lab'));
  overlay.querySelectorAll('[data-edit-lab]').forEach(b=> b.onclick = ()=>{ const rec = state.labs.find(x=>x.id===b.dataset.editLab); openLabForm(overlay, p, rec); });
  overlay.querySelectorAll('[data-del-lab]').forEach(b=> b.onclick = async ()=>{ if(!confirm('Delete this lab panel?')) return; state.labs = state.labs.filter(x=>x.id!==b.dataset.delLab); await saveData(); renderDetail(overlay); render(); });

  // Antimicrobials
  overlay.querySelector('#addAbxBtn')?.addEventListener('click', ()=> openAbxForm(overlay, p, null));

  overlay.querySelectorAll('[data-del-abx]').forEach(b=> b.onclick = async ()=>{ if(!confirm('Delete this antimicrobial course?')) return; state.abx = state.abx.filter(x=>x.id!==b.dataset.delAbx); await saveData(); renderDetail(overlay); render(); });

  // Devices
  overlay.querySelector('#addDevBtn')?.addEventListener('click', ()=> openDeviceForm(overlay, p, null));

  // Investigations
  overlay.querySelector('#addInvBtn')?.addEventListener('click', ()=> openInvForm(overlay, p, null));

  overlay.querySelectorAll('[data-edit-inv]').forEach(b=> b.onclick = ()=>{ const rec = state.investigations.find(x=>x.id===b.dataset.editInv); openInvForm(overlay, p, rec); });
  overlay.querySelectorAll('[data-del-inv]').forEach(b=> b.onclick = async ()=>{ if(!confirm('Delete this investigation record?')) return; state.investigations = state.investigations.filter(x=>x.id!==b.dataset.delInv); await saveData(); renderDetail(overlay); render(); });

  // Notes
  overlay.querySelector('#addNoteBtn')?.addEventListener('click', ()=> openNoteForm(overlay, p, null));
  overlay.querySelectorAll('[data-edit-note]').forEach(b=> b.onclick = ()=>{ const rec = state.entries.find(x=>x.id===b.dataset.editNote); openNoteForm(overlay, p, rec); });
  overlay.querySelectorAll('[data-del-note]').forEach(b=> b.onclick = async ()=>{ if(!confirm('Delete this note?')) return; state.entries = state.entries.filter(x=>x.id!==b.dataset.delNote); await saveData(); renderDetail(overlay); render(); });
}

/* ================= Inline forms ================= */
function openVitalForm(overlay, p, existing){
  const host = overlay.querySelector('#vitalFormHost');
  host.innerHTML = `
    <div class="quickform">
      <div class="field-row three">
        <div class="field"><label>Date</label><input id="vf_date" type="date" value="${existing?existing.date:todayStr()}"></div>
        <div class="field"><label>Time (optional)</label><input id="vf_time" type="time" value="${existing?esc(existing.time||''):''}"></div>
      </div>
      <div class="field-row four">
        ${VITAL_FIELDS.map(f=>{
          if(f.type==='bp'){ return `<div class="field"><label>${f.label} <span style="text-transform:none;">(${f.unit})</span></label><input id="vf_bp" inputmode="numeric" placeholder="120/80" value="${existing?esc(bpDisplay(existing)):''}"></div>`; }
          return `<div class="field"><label>${f.label} <span style="text-transform:none;">(${f.unit})</span></label><input id="vf_${f.k}" type="number" step="any" value="${existing&&existing[f.k]!==undefined?esc(existing[f.k]):''}"></div>`;
        }).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn ghost small" id="vf_cancel">Cancel</button>
        <button class="btn small" id="vf_save">${existing?'Update reading':'Save reading'}</button>
      </div>
    </div>`;
  host.querySelector('#vf_cancel').onclick = ()=> host.innerHTML='';
  host.querySelector('#vf_save').onclick = async ()=>{
    const rec = { id: existing?existing.id:uid(), patientId:p.id, date: document.getElementById('vf_date').value || todayStr(), time: document.getElementById('vf_time').value };
    VITAL_FIELDS.forEach(f=>{
      if(f.type==='bp'){
        const raw = document.getElementById('vf_bp').value.trim();
        rec.bp = raw;
        const {sbp,dbp} = parseBP(raw);
        rec.sbp = sbp; rec.dbp = dbp;
      } else {
        rec[f.k] = document.getElementById('vf_'+f.k).value;
      }
    });
    if(existing){ Object.assign(existing, rec); } else { state.vitals.push(rec); }
    await saveData(); host.innerHTML=''; renderDetail(overlay); render();
    showToast(existing?'Vitals updated':'Vitals saved');
  };
}

/* ================= Trend charts ================= */
function buildLineChartSVG(points, opts){
  if(points.length===0) return `<div class="empty">No data points yet for this parameter.</div>`;
  const w=680,h=230, padL=46,padR=16,padT=16,padB=34;
  const vals = points.map(pt=>pt.v);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if(opts.refLo!=null) lo = Math.min(lo, opts.refLo);
  if(opts.refHi!=null) hi = Math.max(hi, opts.refHi);
  if(lo===hi){ lo-=1; hi+=1; }
  const pad = (hi-lo)*0.12; lo-=pad; hi+=pad;
  const xStep = points.length>1 ? (w-padL-padR)/(points.length-1) : 0;
  const xAt = i=> padL + xStep*i;
  const yAt = v=> padT + (h-padT-padB) * (1 - (v-lo)/(hi-lo));
  let refBand = '';
  if(opts.refLo!=null && opts.refHi!=null){
    refBand = `<rect x="${padL}" y="${yAt(opts.refHi).toFixed(1)}" width="${(w-padL-padR)}" height="${(yAt(opts.refLo)-yAt(opts.refHi)).toFixed(1)}" fill="#0E7A57" opacity="0.08"/>`;
  }
  const linePts = points.map((pt,i)=> `${xAt(i).toFixed(1)},${yAt(pt.v).toFixed(1)}`).join(' ');
  const dots = points.map((pt,i)=> `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(pt.v).toFixed(1)}" r="3.6" fill="${pt.crit?'#A73434':'#0A5A40'}"/>`).join('');
  const showEvery = points.length<=8 ? 1 : Math.ceil(points.length/8);
  const xLabels = points.map((pt,i)=> (i%showEvery===0 || i===points.length-1) ? `<text x="${xAt(i).toFixed(1)}" y="${h-10}" font-size="9" text-anchor="middle" fill="#5B6478" font-family="IBM Plex Mono, monospace">${esc(pt.date.slice(5))}</text>` : '').join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; background:#fff; border:1px solid #E2E6EF; border-radius:8px;">
    ${refBand}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${h-padB}" stroke="#E2E6EF"/>
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#E2E6EF"/>
    <text x="4" y="${(yAt(hi)+4).toFixed(1)}" font-size="9" fill="#5B6478" font-family="IBM Plex Mono, monospace">${hi.toFixed(1)}</text>
    <text x="4" y="${(yAt(lo)+4).toFixed(1)}" font-size="9" fill="#5B6478" font-family="IBM Plex Mono, monospace">${lo.toFixed(1)}</text>
    <polyline points="${linePts}" fill="none" stroke="#0E7A57" stroke-width="2"/>
    ${dots}
    ${xLabels}
  </svg>
  <div style="font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5B6478; margin-top:6px;">${esc(opts.label)} (${esc(opts.unit)})${opts.refLo!=null?` · shaded band = reference range ${opts.refLo}–${opts.refHi}`:''} · red dot = beyond critical threshold</div>`;
}
function openTrendModal(p, kind){
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  const fieldsList = kind==='lab' ? LAB_FIELDS : [...VITAL_FIELDS.filter(f=>f.type!=='bp'), SBP_FIELD, DBP_FIELD, MAP_FIELD];
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h2>Trend viewer</h2><button class="x">&times;</button></div>
      <div class="field"><label>Parameter</label><select id="trendField">${fieldsList.map(f=>`<option value="${f.k}">${esc(f.label)}</option>`).join('')}</select></div>
      <div id="trendChartHost" style="margin-top:14px;"></div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.x').onclick = ()=> overlay.remove();
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };
  const sel = overlay.querySelector('#trendField');
  function draw(){
    const key = sel.value;
    const f = fieldsList.find(x=>x.k===key);
    let points;
    if(key==='map'){
      const rows = state.vitals.filter(v=>v.patientId===p.id).sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
      points = rows.map(r=>({date:r.date, v:computeMAP(r)})).filter(pt=>pt.v!=null).map(pt=>({...pt, crit: flagFor(MAP_FIELD, pt.v)==='crit'}));
    } else {
      const source = kind==='lab' ? state.labs : state.vitals;
      const rows = source.filter(r=>r.patientId===p.id && r[key]!=='' && r[key]!=null && !isNaN(parseFloat(r[key]))).sort((a,b)=>(a.date+(a.time||'')).localeCompare(b.date+(b.time||'')));
      points = rows.map(r=>({date:r.date, v:parseFloat(r[key]), crit: flagFor(f, r[key])==='crit'}));
    }
    overlay.querySelector('#trendChartHost').innerHTML = buildLineChartSVG(points, {refLo: f.ref?f.ref[0]:null, refHi: f.ref?f.ref[1]:null, unit: f.unit, label: f.label});
  }
  sel.onchange = draw;
  draw();
}

document.getElementById('btnExport').onclick = ()=>{

  state.patients.forEach(p=>{
    const base = [p.name,p.mrn,p.age,p.sex,p.ward,p.bed,p.doctor||'',p.admissionDate, (p.diagnoses||[]).map(d=>d.text).join('; '), (p.allergies||[]).map(a=>a.allergen+(a.reaction?(' ('+a.reaction+')'):'')).join('; ')];
    state.vitals.filter(v=>v.patientId===p.id).forEach(v=> rows.push([...base,'Vitals',v.date, VITAL_FIELDS.map(f=> f.type==='bp' ? `BP=${bpDisplay(v)||'—'}` : `${f.label}=${v[f.k]||'—'}`).join(', ')]));
    state.labs.filter(l=>l.patientId===p.id).forEach(l=> rows.push([...base,'Lab',l.date, LAB_FIELDS.map(f=>`${f.label}=${l[f.k]||'—'}`).join(', ')]));
    state.abx.filter(a=>a.patientId===p.id).forEach(a=> rows.push([...base,'Antimicrobial',a.startDate, `${a.name} ${a.dose} ${a.frequency} ${a.route} start=${a.startDate} end=${a.endDate||'ongoing'} planned=${a.prespecifiedDuration||''} indication=${a.indication||''}`]));
    state.devices.filter(d=>d.patientId===p.id).forEach(d=> rows.push([...base,'Device',d.startDate, `${d.type} ${d.detail||''} start=${d.startDate} end=${d.endDate||'in situ'}`]));
    state.investigations.filter(i=>i.patientId===p.id).forEach(i=> rows.push([...base,'Investigation',i.collectionDate, `${i.category} / ${i.specimen}${i.bcSource?(' ['+i.bcSource+(i.bcBottles?(' / '+i.bcBottles):'')+']'):''} result=${i.result} organism=${i.organism||''} resistance=${i.resistance||''} notes=${i.notes||''}`]));
    state.entries.filter(e=>e.patientId===p.id).forEach(n=> rows.push([...base,'Note',n.date, `Radiology: ${n.radiology||''} | Comments: ${n.comments||''} | Plan: ${n.recommendations||''}`]));
  });
  const csv = rows.map(r => r.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `rounding-ledger-${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
};

loadData();

/* Backup / restore (on-device data safety net) */
document.getElementById('btnBackup').onclick = downloadBackup;
document.getElementById('btnRestore').onclick = ()=> document.getElementById('restoreFile').click();
document.getElementById('restoreFile').onchange = (e)=>{ const f=e.target.files[0]; if(f) restoreBackup(f); e.target.value=''; };

/* Register the service worker (enables install + offline use) */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(err=>console.warn('SW registration failed', err)));
}

</script>
